services:
  db:
    image: postgres:15
    container_name: finglobal_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d financial_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build: .
    container_name: api_scheduler
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "-m", "app.scheduler"]
    depends_on:
      db:
        condition: service_healthy

  api_manual:
    build: .
    container_name: api_manual_run
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "-m", "app.api_main"]
    depends_on:
      db:
        condition: service_healthy

  backfill:
    build: .
    container_name: api_backfill
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "-c", "from app.api_main import run_backfill_last_7_days; run_backfill_last_7_days()"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: